name: Release

on:
  release:
    types: [published]

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Pinned: the npm bundled with the Node 22.22.x toolcache has a broken
          # module tree (missing promise-retry, actions/runner-images#13883) that
          # makes `npm install -g npm@latest` fail. 22.20.0 predates the
          # regression, so a real global npm install works -- which npm OIDC
          # trusted publishing requires (this repo publishes without a token).
          node-version: '22.20.0'
          registry-url: 'https://registry.npmjs.org'

      # Ensure npm 11.5.1 or later is installed (required for OIDC trusted publishing).
      # Pinned to npm 11: npm 12 requires Node >=22.22.2, which conflicts with the
      # 22.20.0 pin above.
      - name: Update npm
        run: npm install -g npm@11

      - name: Set version from release tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm version $VERSION --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Commit version to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${GITHUB_REF_NAME#v}" || echo "No changes to commit"
          git push origin HEAD:main

  publish-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            datacontract/editor:latest
            datacontract/editor:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: index.docker.io/datacontract/editor
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
